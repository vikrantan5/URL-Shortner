{% extends "basehome/base.html" %}
{% block title %}Update Business Card — NeuraSafe{% endblock %}
{% load static %}
{% block content %}
<link rel="icon" href="{% static 'images/logo.ico' %}" type="image/x-icon">

<div class="ns-app-content" data-testid="update-card-root">
  <div class="animate-fade-in-up" style="max-width: 780px; margin: 0 auto;">
    <div style="margin-bottom: 24px;">
      <p style="color: var(--text-muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; margin: 0 0 8px;">Edit Card</p>
      <h1 style="font-size: clamp(26px, 4vw, 38px); font-weight: 800; letter-spacing: -0.02em; margin: 0;">
        Update <span class="text-gradient-cyan">Business Card</span>
      </h1>
    </div>
    <form method="post" enctype="multipart/form-data" class="ns-card animate-fade-in-up delay-1" style="padding: 28px; display: flex; flex-direction: column; gap: 14px;" data-testid="update-card-form">
      {% csrf_token %}
      {{ form.as_p }}
      <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px;">
        <button type="submit" class="ns-btn-primary" data-testid="update-card-submit">Update Card</button>
        <a href="{% url 'business_card_list' %}" class="ns-btn-ghost">← Back to Cards</a>
      </div>
    </form>
  </div>
</div>

<div id="loading-spinner" class="hidden fixed inset-0" style="background: rgba(2,6,23,0.75); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center;">
  <div class="loader-modern"></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.querySelector('form');
    const sp = document.getElementById('loading-spinner');
    if (form && sp) form.addEventListener('submit', () => { sp.classList.remove('hidden'); sp.style.display = 'flex'; });
  });
</script>
{% endblock %}
