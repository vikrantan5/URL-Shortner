{% extends 'basehome/base.html' %}
{% block title %}Delete Link{% endblock %}

{% block content %}
{% load static %}

<body class="overflow-hidden">
<div class="bg-gray-100 p-10 sm:ml-64 mt-12 overflow-y-auto max-h-screen">
    <div class="max-w-xl mx-auto">
        
        <div class="bg-white rounded-lg shadow-md p-8">
            <div class="text-center mb-6">
                <svg class="w-20 h-20 mx-auto text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Delete Link</h1>
                <p class="text-gray-600">Are you sure you want to delete this link?</p>
            </div>

            <div class="bg-gray-50 rounded-lg p-4 mb-6">
                <p class="font-semibold text-gray-800">{{ link.title }}</p>
                <p class="text-sm text-gray-600">{{ link.url }}</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="flex items-center justify-center space-x-4">
                    <a href="{% url 'profile_dashboard' %}" 
                       class="px-6 py-3 border border-gray-300 rounded-lg text-gray-700 font-semibold hover:bg-gray-50 transition">
                        Cancel
                    </a>
                    <button type="submit" 
                            class="px-6 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition">
                        <i class="fas fa-trash mr-2"></i>Delete Link
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
</body>

{% endblock %}
